<!doctype html>
<html lang="en">
   <head>
   <!-- Required meta tags -->
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">

   <!-- Bootstrap CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

   <title>Hello, world!</title>
   </head>
   <body>
         <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
               SNEAK<span class="text-danger">PEAK</span>
            </a>
            <div>
               <button type="button" class="btn btn-dark rounded-pill">
                  Dark
               </button>
                  <a href="/addNewShoe.html" class="btn btn-dark rounded-pill">
                     Add New Shoe
                  </a>
            </div>
            </div>
         </nav>

         <form id="add-new-shoe-form">
            <div class="mb-3">
               <label for="brand" class="form-label">Brand</label>
               <input 
                     class="form-control" 
                     name="brand" 
                     type="brand"
                     id="brand" 
                     placeholder="brand">
            </div>
            
            <div class="mb-3">
               <label for="model" class="form-label">Model</label>
               <input 
                     class="form-control" 
                     name="model" 
                     type="model"
                     id="model" 
                     placeholder="brand">
            </div>

            <select name="category" class="form-select" aria-label="Default select example">
               <option selected>Select Kategori...</option>
               <option value="sneakers">Sneakers</option>
               <option value="running">Running</option>
               <option value="slip-on">Slip-on/Casual</option>
            </select>
            
            <div class="mb-3">
               <label for="color" id="color" class="form-label">Color</label>
               <input 
                     class="form-control" 
                     type="color"
                     name="color" 
                     id="color" 
                     placeholder="color">
            </div>
            
            <div class="mb-3">
               <label for="description" id="description" class="form-label">Description</label>
               <input 
                     class="form-control" 
                     type="description"
                     name="description" 
                     id="description" 
                     placeholder="description">
            </div>

            <div class="mb-3">
               <label for="img-url" id="img-url" class="form-label">Img Url</label>
               <input 
                     class="form-control" 
                     type="imageUrl"
                     name="imageUrl" 
                     id="img-url" 
                     placeholder="img-url">
            </div>
            
            <div class="form-check mb-3">
               <input name="inStock" class="form-check-input" type="checkbox" value="true" id="flexCheckDefault">
               <label class="form-check-label" for="flexCheckDefault">
                  In Stock
               </label>
            </div>

            <div class="mb-3">
               <label for="price" id="price" class="form-label">Price</label>
               <input 
                     class="form-control" 
                     type="price"
                     name="price" 
                     id="price" 
                     placeholder="price">
            </div>

            <button type="reset" class="btn btn-secondary">Clear</button>
            <button type="submit" class="btn btn-dark">Save Data</button>
         </form>

      <!-- Optional JavaScript; choose one of the two! -->

      <!-- Option 1: Bootstrap Bundle with Popper -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

      <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
   
      <script src="js/add-new-shoe.js"></script>
   </body>
</html>
